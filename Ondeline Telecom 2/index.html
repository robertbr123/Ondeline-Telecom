<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ondeline — Conexão sem limites no Vale do Juruá</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --bg-soft: #f4f7f8;
  --bg-dark: #0a2540;
  --bg-deeper: #051a2e;
  --ink: #0a2540;
  --ink-2: #3d5672;
  --ink-mute: #7a8ba0;
  --ink-soft: #aab7c4;
  --teal: #0fb8b3;
  --teal-bright: #14d4cf;
  --teal-dark: #0a8a86;
  --teal-soft: #e6f9f8;
  --accent: #ff6b4a;
  --accent-soft: #fff0ec;
  --yellow: #ffc94a;
  --line: #e4ebf0;
  --line-2: #cfd8e0;
  --sans: "Manrope", ui-sans-serif, system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
body { overflow-x: hidden; }
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
img { display: block; max-width: 100%; }
::selection { background: var(--teal); color: #fff; }

.shell { max-width: 1320px; margin: 0 auto; padding: 0 32px; }
@media (max-width: 720px) { .shell { padding: 0 20px; } }

/* ======== TOP BAR (slim) ======== */
.topbar {
  background: var(--bg-dark); color: #c7d4e0;
  font-size: 12.5px; font-weight: 500;
  padding: 10px 0;
}
.topbar .row { display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap; }
.topbar .left { display: flex; align-items: center; gap: 24px; }
.topbar .left span { display: inline-flex; align-items: center; gap: 8px; }
.topbar .left .dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 8px #4ade80; }
.topbar a { color: #fff; font-weight: 600; white-space: nowrap; }
.topbar .left span { white-space: nowrap; }
.topbar a:hover { color: var(--teal-bright); }

/* ======== NAV ======== */
.nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
}
.nav-inner { display: flex; align-items: center; justify-content: space-between; gap: 24px; padding: 16px 0; }
.nav-logo img { height: 40px; width: auto; }
.nav-links { display: flex; gap: 34px; align-items: center; }
.nav-links a { font-size: 14.5px; font-weight: 600; color: var(--ink); padding: 6px 0; position: relative; transition: color .2s; }
.nav-links a:hover { color: var(--teal); }
.nav-cta {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 22px;
  background: var(--teal); color: #fff;
  font-weight: 700; font-size: 14px;
  border-radius: 999px;
  transition: transform .2s, box-shadow .2s, background .2s;
}
.nav-cta:hover { background: var(--teal-dark); transform: translateY(-1px); box-shadow: 0 12px 28px -10px var(--teal); }
@media (max-width: 900px) { .nav-links { display: none; } }

/* ======== HERO ======== */
.hero {
  position: relative;
  padding: 72px 0 100px;
  overflow: hidden;
  background:
    radial-gradient(ellipse 70% 55% at 85% 0%, var(--teal-soft) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 0% 80%, #fff5f1 0%, transparent 60%),
    #ffffff;
}
.hero-inner { position: relative; display: grid; grid-template-columns: 1.1fr 1fr; gap: 56px; align-items: center; }
.hero-pill {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 8px 14px 8px 8px;
  border-radius: 999px; background: #fff; border: 1px solid var(--line);
  font-size: 12.5px; font-weight: 600; color: var(--ink-2);
  margin-bottom: 28px;
  box-shadow: 0 2px 6px rgba(10,37,64,0.04);
}
.hero-pill .tag { background: var(--teal); color: #fff; font-weight: 700; font-size: 11px; padding: 4px 10px; border-radius: 999px; letter-spacing: 0.04em; }
.hero h1 {
  font-size: clamp(42px, 5.6vw, 76px);
  font-weight: 800; line-height: 1.02; letter-spacing: -0.03em;
  margin-bottom: 24px;
  color: var(--ink);
}
.hero h1 .highlight {
  color: var(--teal);
  background: linear-gradient(to top, var(--teal-soft) 28%, transparent 28%);
  -webkit-box-decoration-break: clone;
  box-decoration-break: clone;
  padding: 0 4px;
  border-radius: 4px;
}
.hero-sub {
  font-size: 18px; line-height: 1.55;
  color: var(--ink-2); max-width: 52ch;
  margin-bottom: 36px;
}
.hero-actions { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 48px; }
.btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 16px 28px; border-radius: 999px;
  font-size: 15px; font-weight: 700;
  transition: transform .2s, background .2s, border-color .2s, color .2s, box-shadow .2s;
  cursor: pointer;
}
.btn-primary { background: var(--teal); color: #fff; box-shadow: 0 8px 20px -6px rgba(15,184,179,0.45); }
.btn-primary:hover { background: var(--teal-dark); transform: translateY(-2px); box-shadow: 0 16px 30px -10px rgba(15,184,179,0.55); }
.btn-ghost { background: #fff; color: var(--ink); border: 1.5px solid var(--line-2); }
.btn-ghost:hover { border-color: var(--teal); color: var(--teal); }
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: #e55638; }
.btn .icon { width: 18px; height: 18px; }

.hero-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; max-width: 540px; }
.hero-stats .cell { padding-right: 20px; }
.hero-stats .cell + .cell { border-left: 1px solid var(--line); padding-left: 24px; }
.hero-stats .v { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; color: var(--teal); line-height: 1; }
.hero-stats .k { font-size: 12.5px; font-weight: 600; color: var(--ink-mute); margin-top: 8px; letter-spacing: 0.02em; }

/* hero visual — clean speed card */
.hero-visual {
  position: relative;
  max-width: 440px;
  margin-left: auto;
  padding: 24px;
}
.hv-bg-blob {
  position: absolute; inset: 0;
  background: radial-gradient(circle at 70% 30%, rgba(15,184,179,0.15) 0%, transparent 60%),
              radial-gradient(circle at 20% 80%, rgba(255,107,74,0.10) 0%, transparent 60%);
  z-index: 0;
  pointer-events: none;
}
.hv-bg-dot {
  position: absolute; top: -20px; right: -20px;
  width: 80px; height: 80px;
  border-radius: 50%;
  background: var(--yellow);
  opacity: 0.85;
  z-index: 1;
  box-shadow: 0 20px 40px -10px rgba(212, 165, 0, 0.3);
}
.hv-card {
  position: relative; z-index: 2;
  background: #fff;
  border-radius: 28px;
  box-shadow: 0 40px 80px -30px rgba(10, 37, 64, 0.25),
              0 10px 30px -10px rgba(10, 37, 64, 0.1);
  overflow: hidden;
}
.hv-card-top {
  background: linear-gradient(160deg, var(--teal) 0%, var(--teal-dark) 100%);
  color: #fff;
  padding: 32px 32px 28px;
  position: relative;
}
.hv-card-top::after {
  content: ""; position: absolute;
  right: -40px; top: -40px;
  width: 160px; height: 160px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.06);
}
.hv-plan-tag {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.18);
  padding: 7px 14px;
  border-radius: 999px;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.08em;
  backdrop-filter: blur(10px);
  margin-bottom: 24px;
}
.hv-plan-tag .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #4ade80;
  box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7);
  animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot {
  0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
  70% { box-shadow: 0 0 0 8px rgba(74, 222, 128, 0); }
  100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
}
.hv-speed { margin-bottom: 22px; }
.hv-speed .n {
  font-size: clamp(64px, 14vw, 96px);
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 0.95;
}
.hv-speed .n .u {
  font-size: 0.32em;
  font-weight: 700;
  letter-spacing: 0.08em;
  margin-left: 10px;
  vertical-align: 0.55em;
  opacity: 0.9;
}
.hv-speed .label {
  font-size: 13px; font-weight: 500;
  opacity: 0.85;
  margin-top: 6px;
  line-height: 1.4;
}
.hv-price {
  display: flex; align-items: baseline; gap: 4px;
  margin-bottom: 22px;
  font-variant-numeric: tabular-nums;
}
.hv-price .curr { font-size: 18px; font-weight: 700; opacity: 0.8; }
.hv-price .big { font-size: 46px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
.hv-price .small { font-size: 20px; font-weight: 700; }
.hv-price .small small { font-size: 14px; font-weight: 500; opacity: 0.75; }
.hv-cta {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%;
  padding: 14px 20px;
  background: #fff; color: var(--teal-dark);
  border-radius: 14px;
  font-weight: 700; font-size: 15px;
  text-decoration: none;
  transition: transform 0.15s, box-shadow 0.15s;
}
.hv-cta:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -8px rgba(0,0,0,0.3); }
.hv-card-bot {
  background: #fff;
  padding: 20px 24px;
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 4px;
  border-top: 1px solid var(--line);
}
.hv-feat {
  display: flex; flex-direction: column; align-items: center;
  gap: 8px; padding: 8px 4px;
  text-align: center;
}
.hv-feat .ico {
  width: 40px; height: 40px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  background: var(--teal-soft); color: var(--teal-dark);
  flex: none;
}
.hv-feat .txt { min-width: 0; }
.hv-feat .k {
  font-size: 10px; font-weight: 700;
  color: var(--ink-mute);
  letter-spacing: 0.06em; text-transform: uppercase;
  margin-bottom: 2px;
}
.hv-feat .v {
  font-size: 14px; font-weight: 800;
  color: var(--ink);
  letter-spacing: -0.005em;
  line-height: 1.1;
  white-space: nowrap;
}
.hv-feat .stars { color: var(--yellow); font-size: 11px; letter-spacing: 1px; }

@media (max-width: 1000px) {
  .hero-inner { grid-template-columns: 1fr; gap: 48px; }
  .hero-visual { margin: 0 auto; }
}
@media (max-width: 540px) {
  .hero { padding: 48px 0 64px; }
  .hero-visual { padding: 16px; }
  .hv-card-top { padding: 26px 24px 22px; }
  .hv-card-bot { padding: 16px 12px; gap: 0; }
  .hv-feat { padding: 6px 2px; gap: 6px; }
  .hv-feat .ico { width: 36px; height: 36px; }
  .hv-feat .v { font-size: 13px; }
  .hv-feat .k { font-size: 9px; }
  .hv-price .big { font-size: 38px; }
  .hero-stats { grid-template-columns: repeat(3, 1fr); max-width: 100%; gap: 0; }
  .hero-stats .cell { padding-right: 10px; }
  .hero-stats .cell + .cell { padding-left: 14px; }
  .hero-stats .v { font-size: 22px; }
  .hero-stats .k { font-size: 10.5px; }
  .hero-actions .btn { flex: 1; min-width: 0; justify-content: center; }
  .hero-pill { font-size: 11.5px; padding: 6px 12px 6px 6px; }
  .hero-pill .tag { font-size: 10px; padding: 3px 8px; }
  .hv-bg-dot { width: 56px; height: 56px; top: -12px; right: -8px; }
}

/* ======== GENERAL SECTION ======== */
.sec { padding: 110px 0; }
.sec.alt { background: var(--bg-soft); }
.sec-lbl {
  display: inline-block;
  background: var(--teal-soft); color: var(--teal-dark);
  font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  padding: 6px 14px; border-radius: 999px;
  margin-bottom: 18px;
}
.sec-head { max-width: 820px; margin-bottom: 64px; }
.sec-head.center { margin: 0 auto 64px; text-align: center; }
.sec-head h2 {
  font-size: clamp(32px, 4.2vw, 56px);
  font-weight: 800; letter-spacing: -0.025em; line-height: 1.05;
  color: var(--ink);
  margin-bottom: 18px;
}
.sec-head h2 span { color: var(--teal); }
.sec-head p { font-size: 17px; color: var(--ink-2); line-height: 1.55; }

/* ======== PLANOS ======== */
.planos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.plan {
  position: relative;
  background: #fff;
  border: 1.5px solid var(--line);
  border-radius: 28px;
  padding: 36px 32px 32px;
  display: flex; flex-direction: column;
  transition: transform .3s, box-shadow .3s, border-color .3s;
}
.plan:hover { transform: translateY(-6px); box-shadow: 0 30px 60px -20px rgba(10,37,64,0.15); border-color: var(--teal); }
.plan.featured {
  background: linear-gradient(170deg, var(--bg-dark) 0%, var(--bg-deeper) 100%);
  color: #fff;
  border: none;
  box-shadow: 0 30px 60px -20px rgba(10,37,64,0.4);
}
.plan.featured .plan-name { color: var(--teal-bright); }
.plan.featured .plan-note,
.plan.featured li { color: #c7d4e0; }
.plan.featured .plan-price { color: #fff; }
.plan.featured .plan-price small { color: #8fa5b8; }
.plan.featured li { border-color: rgba(255,255,255,0.1); }
.plan.featured .plan-speed .u { color: #c7d4e0; }
.plan.featured li::before {
  background: var(--teal-bright);
  border-color: var(--teal-bright);
  color: var(--bg-dark);
}

.plan-badge {
  position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: #fff;
  font-size: 11px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 6px 14px; border-radius: 999px;
  box-shadow: 0 10px 20px -6px rgba(255,107,74,0.5);
}
.plan-name {
  font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 18px;
}
.plan-speed { display: flex; align-items: baseline; gap: 6px; margin-bottom: 8px; }
.plan-speed .n { font-size: 72px; font-weight: 800; letter-spacing: -0.04em; line-height: 1; }
.plan-speed .u { font-size: 16px; font-weight: 700; color: var(--ink-mute); letter-spacing: 0.02em; }
.plan-note { font-size: 14px; font-weight: 500; color: var(--ink-mute); margin-bottom: 22px; }
.plan-price { font-size: 38px; font-weight: 800; letter-spacing: -0.02em; color: var(--ink); line-height: 1; }
.plan-price small { font-size: 15px; font-weight: 600; color: var(--ink-mute); margin-left: 2px; }
.plan-price-alt { font-size: 13px; color: var(--ink-mute); margin-top: 4px; margin-bottom: 24px; font-weight: 500; }
.plan ul { list-style: none; margin-bottom: 28px; flex-grow: 1; }
.plan li {
  font-size: 14.5px; color: var(--ink-2); padding: 12px 0;
  border-top: 1px solid var(--line);
  display: flex; align-items: center; gap: 12px;
}
.plan li::before {
  content: "✓"; width: 20px; height: 20px; border-radius: 50%;
  background: var(--teal); border: 1px solid var(--teal);
  color: #fff; font-weight: 800; font-size: 11px;
  display: flex; align-items: center; justify-content: center; flex: none;
}
.plan .btn { width: 100%; justify-content: center; }
.plan.featured .btn-ghost { background: transparent; color: #fff; border-color: rgba(255,255,255,0.25); }
.plan.featured .btn-ghost:hover { border-color: var(--teal-bright); color: var(--teal-bright); }

@media (max-width: 900px) { .planos-grid { grid-template-columns: 1fr; } }

/* ======== COBERTURA ======== */
.cov-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: center; }
.map-wrap {
  position: relative;
  aspect-ratio: 4/5;
  border-radius: 32px;
  overflow: hidden;
  background: linear-gradient(160deg, #f4f7f8 0%, #e6f9f8 100%);
  border: 1.5px solid var(--line);
  padding: 20px;
}
.map-svg { width: 100%; height: 100%; }
.cities-list { display: flex; flex-direction: column; gap: 14px; }
.city-item {
  display: flex; align-items: center; gap: 18px;
  padding: 20px 24px;
  background: #fff;
  border: 1.5px solid var(--line);
  border-radius: 18px;
  transition: transform .2s, border-color .2s, box-shadow .2s;
  cursor: pointer;
}
.city-item:hover { transform: translateX(6px); border-color: var(--teal); box-shadow: 0 12px 30px -14px rgba(15,184,179,0.3); }
.city-item > svg:last-child { color: var(--ink-mute); flex: none; transition: color .2s, transform .2s; }
.city-item:hover > svg:last-child { color: var(--teal); transform: translateX(3px); }
.city-item .badge {
  width: 52px; height: 52px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 18px; flex: none;
}
.city-item .badge.active { background: var(--teal-soft); color: var(--teal-dark); }
.city-item .badge.soon { background: var(--accent-soft); color: var(--accent); }
.city-item .info { flex: 1; }
.city-item .info h5 { font-size: 19px; font-weight: 800; letter-spacing: -0.01em; }
.city-item .info p { font-size: 13.5px; color: var(--ink-mute); margin-top: 2px; font-weight: 500; }
.city-item .status {
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 6px 12px; border-radius: 999px;
}
.city-item .status.active { background: var(--teal); color: #fff; }
.city-item .status.soon { background: var(--accent-soft); color: var(--accent); }

@media (max-width: 900px) { .cov-wrap { grid-template-columns: 1fr; } .map-wrap { aspect-ratio: 1/1; } }

/* ======== POR QUE ======== */
.why-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.why-card {
  background: #fff;
  border: 1.5px solid var(--line);
  border-radius: 24px;
  padding: 32px 28px;
  transition: transform .25s, border-color .25s, box-shadow .25s;
}
.why-card:hover { transform: translateY(-4px); border-color: var(--teal); box-shadow: 0 24px 50px -20px rgba(10,37,64,0.15); }
.why-icon {
  width: 58px; height: 58px; border-radius: 16px;
  background: var(--teal-soft); color: var(--teal);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 22px;
}
.why-icon svg { width: 28px; height: 28px; }
.why-card h4 { font-size: 20px; font-weight: 800; letter-spacing: -0.015em; margin-bottom: 10px; }
.why-card p { font-size: 14.5px; color: var(--ink-2); line-height: 1.55; }
@media (max-width: 900px) { .why-grid { grid-template-columns: 1fr; } }

/* ======== SPEED / BANNER ======== */
.speed-banner {
  background: linear-gradient(130deg, var(--bg-dark) 0%, #0d2d4f 100%);
  color: #fff;
  border-radius: 36px;
  padding: 64px 56px;
  position: relative; overflow: hidden;
  display: grid; grid-template-columns: 1.2fr 1fr; gap: 48px; align-items: center;
}
.speed-banner::before {
  content: ""; position: absolute; top: -20%; right: -10%;
  width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(15,184,179,0.4), transparent 70%);
}
.speed-banner h2 { font-size: clamp(32px, 4.2vw, 52px); font-weight: 800; letter-spacing: -0.025em; line-height: 1.05; margin-bottom: 16px; }
.speed-banner h2 span { color: var(--teal-bright); }
.speed-banner p { font-size: 17px; color: #c7d4e0; max-width: 48ch; line-height: 1.55; margin-bottom: 28px; }
.speed-gauge { position: relative; z-index: 1; text-align: center; }
.speed-num { font-size: 132px; font-weight: 800; letter-spacing: -0.05em; line-height: 1; color: var(--teal-bright); }
.speed-sub { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 0.08em; margin-top: 4px; }
.speed-dots { display: flex; gap: 4px; justify-content: center; margin-top: 20px; }
.speed-dots .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); }
.speed-dots .dot.on { background: var(--teal-bright); box-shadow: 0 0 10px var(--teal-bright); }
.speed-meta {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
  border-top: 1px solid rgba(255,255,255,0.12);
  margin-top: 40px; padding-top: 28px;
}
.speed-meta .cell { padding-right: 20px; }
.speed-meta .cell + .cell { border-left: 1px solid rgba(255,255,255,0.12); padding-left: 24px; }
.speed-meta .v { font-size: 28px; font-weight: 800; color: var(--teal-bright); letter-spacing: -0.02em; line-height: 1; }
.speed-meta .k { font-size: 12px; font-weight: 600; color: #c7d4e0; margin-top: 6px; letter-spacing: 0.05em; }

@media (max-width: 900px) {
  .speed-banner { grid-template-columns: 1fr; padding: 48px 32px; border-radius: 24px; }
}

/* ======== TESTI ======== */
.testi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.testi {
  background: #fff;
  border: 1.5px solid var(--line);
  border-radius: 24px;
  padding: 32px 28px;
  display: flex; flex-direction: column;
}
.testi .stars { color: var(--yellow); font-size: 16px; margin-bottom: 14px; letter-spacing: 2px; }
.testi q {
  font-size: 16px; line-height: 1.55; color: var(--ink);
  quotes: none; font-weight: 500; flex-grow: 1;
}
.testi q::before, .testi q::after { content: ""; }
.testi .who { display: flex; align-items: center; gap: 12px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--line); }
.testi .avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, var(--teal), var(--teal-bright));
  color: #fff; font-weight: 800; display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.testi .who-name { font-size: 14.5px; font-weight: 700; }
.testi .who-city { font-size: 12.5px; color: var(--ink-mute); margin-top: 2px; font-weight: 500; }
@media (max-width: 900px) { .testi-grid { grid-template-columns: 1fr; } }

/* ======== CTA ======== */
.cta {
  padding: 110px 0; position: relative; overflow: hidden;
  background:
    radial-gradient(ellipse 60% 50% at 20% 50%, var(--teal-soft), transparent 60%),
    #fff;
}
.cta-card {
  background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
  color: #fff;
  border-radius: 36px;
  padding: 72px 64px;
  position: relative; overflow: hidden;
  display: grid; grid-template-columns: 1.2fr 1fr; gap: 56px; align-items: center;
  box-shadow: 0 40px 80px -30px rgba(15,184,179,0.5);
}
.cta-card::before {
  content: ""; position: absolute; right: -8%; top: -20%;
  width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 60%);
}
.cta-card::after {
  content: ""; position: absolute; left: -5%; bottom: -30%;
  width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.1), transparent 60%);
}
.cta-card h2 {
  font-size: clamp(36px, 4.6vw, 60px); font-weight: 800; letter-spacing: -0.03em; line-height: 1.02; margin-bottom: 18px;
  position: relative; z-index: 1;
}
.cta-card p { font-size: 17px; max-width: 44ch; line-height: 1.55; opacity: 0.92; position: relative; z-index: 1; }
.cta-form {
  position: relative; z-index: 1;
  background: #fff;
  border-radius: 24px;
  padding: 32px;
  color: var(--ink);
  box-shadow: 0 30px 60px -20px rgba(0,0,0,0.2);
}
.cta-form h3 { font-size: 20px; font-weight: 800; margin-bottom: 20px; letter-spacing: -0.01em; }
.cta-form label { display: block; font-size: 12px; font-weight: 700; color: var(--ink-mute); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; margin-top: 14px; }
.cta-form input, .cta-form select {
  width: 100%;
  background: #f6f9fb; border: 1.5px solid var(--line);
  padding: 13px 14px; border-radius: 12px;
  font: inherit; font-size: 15px; font-weight: 500;
  outline: none;
  transition: border-color .2s, background .2s;
}
.cta-form input:focus, .cta-form select:focus { border-color: var(--teal); background: #fff; }
.cta-form .btn { width: 100%; justify-content: center; margin-top: 20px; }
.cta-thanks { text-align: center; padding: 20px 0; }
.cta-thanks .check {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--teal-soft); color: var(--teal);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 18px;
  font-size: 32px; font-weight: 800;
}
.cta-thanks h4 { font-size: 22px; font-weight: 800; letter-spacing: -0.015em; }
.cta-thanks p { margin-top: 10px; color: var(--ink-2); font-size: 15px; line-height: 1.55; }

@media (max-width: 900px) {
  .cta-card { grid-template-columns: 1fr; padding: 48px 28px; border-radius: 24px; }
}

/* ======== FOOTER ======== */
footer {
  background: var(--bg-dark); color: #c7d4e0;
  padding: 80px 0 32px;
}
.foot-top { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 48px; margin-bottom: 56px; }
.foot-brand img { height: 44px; margin-bottom: 20px; filter: brightness(1.2); }
.foot-brand p { font-size: 14.5px; line-height: 1.6; max-width: 32ch; color: #8fa5b8; }
.foot-top h5 { font-size: 13px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: #fff; margin-bottom: 20px; }
.foot-top ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.foot-top a { font-size: 14.5px; color: #8fa5b8; font-weight: 500; }
.foot-top a:hover { color: var(--teal-bright); }
.foot-bot {
  border-top: 1px solid rgba(255,255,255,0.08);
  padding-top: 28px;
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;
  font-size: 13px; color: #8fa5b8;
}
.foot-bot .socials { display: flex; gap: 10px; }
.foot-bot .socials a {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.05); color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
  transition: background .2s;
}
.foot-bot .socials a:hover { background: var(--teal); }
@media (max-width: 900px) { .foot-top { grid-template-columns: 1fr 1fr; } }

/* ======== FADE IN ======== */
.fade-in { opacity: 0; transform: translateY(24px); transition: opacity .7s ease, transform .7s ease; }
.fade-in.in { opacity: 1; transform: translateY(0); }

/* ======== MOBILE NAV ======== */
.nav-burger {
  display: none; width: 44px; height: 44px;
  border: 1.5px solid var(--line); border-radius: 12px;
  background: #fff; cursor: pointer;
  flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  padding: 0; transition: border-color .2s;
}
.nav-burger:hover { border-color: var(--teal); }
.nav-burger span {
  display: block; width: 20px; height: 2px; border-radius: 2px;
  background: var(--ink); transition: transform .25s ease, opacity .2s ease;
}
.nav-burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.nav-burger.open span:nth-child(2) { opacity: 0; }
.nav-burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

.mobile-menu {
  position: fixed; inset: 0; z-index: 49;
  background: rgba(10,37,64,0.5); backdrop-filter: blur(4px);
  opacity: 0; pointer-events: none;
  transition: opacity .25s ease;
}
.mobile-menu.open { opacity: 1; pointer-events: auto; }
.mobile-menu-inner {
  position: absolute; top: 73px; left: 0; right: 0;
  background: #fff; padding: 24px 20px 32px;
  display: flex; flex-direction: column; gap: 4px;
  box-shadow: 0 20px 40px -20px rgba(10,37,64,0.3);
  border-bottom: 1px solid var(--line);
  transform: translateY(-12px); transition: transform .3s ease;
  max-height: calc(100vh - 73px); overflow-y: auto;
}
.mobile-menu.open .mobile-menu-inner { transform: translateY(0); }
.mobile-menu-inner > a {
  font-size: 17px; font-weight: 700; color: var(--ink);
  padding: 14px 4px; border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
}
.mobile-menu-inner > a:hover { color: var(--teal); }
.mm-cities {
  margin-top: 14px; padding: 16px; background: var(--bg-soft); border-radius: 14px;
  display: flex; flex-direction: column; gap: 2px;
}
.mm-cities .mm-lbl {
  font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
  color: var(--ink-mute); text-transform: uppercase; margin-bottom: 6px;
}
.mm-cities a {
  font-size: 15px; font-weight: 600; color: var(--ink-2);
  padding: 8px 0;
}
.mm-cities a:hover { color: var(--teal); }
.mm-cta { margin-top: 16px; justify-content: center; padding: 16px 22px !important; font-size: 16px !important; }

/* ======== MOBILE BREAKPOINT ======== */
@media (max-width: 900px) {
  .shell { padding: 0 20px; }
  .topbar { display: none; }
  .nav-links { display: none; }
  .nav-cta { display: none; }
  .nav-burger { display: flex; }
  .nav-inner { padding: 14px 0; }
  .nav-logo img { height: 34px; }

  /* Hero */
  .hero { padding: 40px 0 60px; }
  .hero-inner { grid-template-columns: 1fr; gap: 36px; }
  .hero h1 { font-size: clamp(38px, 10vw, 54px); }
  .hero-sub { font-size: 16px; margin-bottom: 28px; }
  .hero-actions { margin-bottom: 36px; }
  .hero-actions .btn { flex: 1 1 100%; justify-content: center; }
  .hero-stats { max-width: none; }
  .hero-stats .v { font-size: 26px; }
  .hero-stats .k { font-size: 11.5px; }
  .hero-stats .cell { padding-right: 12px; }
  .hero-stats .cell + .cell { padding-left: 14px; }
  .hero-visual { max-width: 100%; margin: 0 auto; }

  /* Sections */
  .sec { padding: 72px 0; }
  .sec-head { margin-bottom: 40px; }
  .sec-head.center { margin-bottom: 40px; }
  .sec-head h2 { font-size: clamp(28px, 7vw, 42px); }
  .sec-head p { font-size: 15.5px; }

  /* Planos */
  .planos-grid { grid-template-columns: 1fr; gap: 18px; }
  .plan { padding: 28px 22px; }
  .plan.featured { transform: none; }

  /* Cobertura */
  .cov-wrap { grid-template-columns: 1fr; gap: 36px; }

  /* Speed banner */
  .speed-banner {
    grid-template-columns: 1fr; padding: 48px 28px; gap: 32px; text-align: center;
  }
  .speed-banner p { margin-left: auto; margin-right: auto; }
  .speed-num { font-size: 92px; }
  .speed-meta { margin-top: 28px; padding-top: 20px; }
  .speed-meta .v { font-size: 22px; }
  .speed-meta .cell { padding-right: 8px; }
  .speed-meta .cell + .cell { padding-left: 12px; }

  /* Testi */
  .testi-grid { grid-template-columns: 1fr; gap: 18px; }
  .testi { padding: 26px 22px; }

  /* Footer */
  .foot-top { grid-template-columns: 1fr !important; gap: 32px; }
  .foot-bot { flex-direction: column; align-items: flex-start; gap: 16px; text-align: left; }

  /* Generic buttons */
  .btn { padding: 14px 22px; font-size: 14.5px; }
}

@media (max-width: 560px) {
  .shell { padding: 0 16px; }
  .hero-stats { grid-template-columns: 1fr 1fr; gap: 16px 0; }
  .hero-stats .cell { padding: 0 14px; }
  .hero-stats .cell + .cell { border-left: 1px solid var(--line); padding-left: 14px; }
  .hero-stats .cell:nth-child(3) { grid-column: 1 / -1; border-left: none; border-top: 1px solid var(--line); padding-top: 14px; padding-left: 0; }
}
</style>
